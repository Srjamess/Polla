<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polla Mundialista | Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-label">POLLA MUNDIALISTA</div>
      <span id="currentUser" class="visually-hidden"></span>
      <button class="profile-trigger" type="button" data-open-more aria-label="Abrir mas opciones">
        <span id="userAvatar" class="user-avatar">PM</span>
      </button>
    </header>

    <main class="page-shell">
      <section class="hero-section">
        <p class="eyebrow">Temporada 2026</p>
        <div id="dashboardNextMatch" class="hero-next-match" aria-label="Proximo partido"></div>
      </section>

      <section class="fixture-tabs" aria-label="Secciones del fixture">
        <button class="fixture-tab active" type="button" data-view="standings">Posiciones</button>
        <button class="fixture-tab" type="button" data-view="matches">Partidos</button>
        <button class="fixture-tab" type="button" data-view="predictions">Predicciones</button>
        <button class="fixture-tab" type="button" data-view="bracket">Eliminatoria</button>
      </section>

      <section id="adminPanel" class="admin-panel glass-card hidden">
        <h2>Administracion</h2>
        <p class="admin-note">
          El fixture oficial ya esta cargado. Usa los formularios dentro de cada tarjeta para guardar resultados reales y definir el clasificado en cruces empatados.
        </p>
      </section>

      <section id="groupsBoard" class="groups-board"></section>
      <section id="matchesBoard" class="groups-board"></section>
      <section id="predictionsBoard" class="groups-board"></section>
      <section id="knockoutBoard" class="knockout-board"></section>
      <p id="emptyMatches" class="empty-state hidden">No hay partidos creados todavia.</p>
    </main>

    <nav class="bottom-nav" aria-label="Navegacion principal">
      <a class="bottom-nav-item" href="leaderboard.html" data-bottom-nav="leaderboard">
        <span class="bottom-nav-icon">🏆</span>
        <span class="bottom-nav-label">Tabla</span>
      </a>
      <button class="bottom-nav-item" type="button" data-open-more data-bottom-nav="more">
        <span class="bottom-nav-icon">•••</span>
        <span class="bottom-nav-label">Mas</span>
      </button>
    </nav>

    <div class="sheet-shell hidden" id="moreSheet" aria-hidden="true">
      <div class="sheet-overlay" data-close-more></div>
      <div class="sheet-card">
        <div class="sheet-head">
          <h2>Mas opciones</h2>
          <button class="sheet-close" type="button" aria-label="Cerrar" data-close-more>&times;</button>
        </div>
        <div class="sheet-list">
          <button class="sheet-item sheet-item-danger hidden" type="button" data-admin-reset-pruebas>
            <span class="sheet-item-icon">!</span>
            <span class="sheet-item-label">Reset pruebas</span>
          </button>
          <button class="sheet-item" type="button" data-open-profile>
            <span class="sheet-item-icon">◉</span>
            <span class="sheet-item-label">Perfil</span>
          </button>
          <button class="sheet-item" type="button" data-open-scoring>
            <span class="sheet-item-icon">?</span>
            <span class="sheet-item-label">Calificacion</span>
          </button>
          <button class="sheet-item" type="button" data-open-predictions-help>
            <span class="sheet-item-icon">i</span>
            <span class="sheet-item-label">Como predecir</span>
          </button>
          <button class="sheet-item" type="button" data-logout>
            <span class="sheet-item-icon">↩</span>
            <span class="sheet-item-label">Salir</span>
          </button>
        </div>
      </div>
    </div>

    <div id="toastRoot" class="toast-root" aria-live="polite"></div>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="app.js"></script>
  </body>
</html>
